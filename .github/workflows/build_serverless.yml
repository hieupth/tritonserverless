
name: Download model huggingface to Docker Image

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  workflow_dispatch:
  push:
    branches: [ "dev/build-docker" ]

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tritonserver: [24.12]
        model_type: ['onnx', 'openvino', 'tensorrt_2412']

    steps:
      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Build and push NVidia TritonServer Image
        uses: docker/build-push-action@v5
        with:
          push: true
          file: ./build/Dockerfile.serverless
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/modelhub:${{ github.event.repository.name }}-nvidia-tritonserver${{ matrix.tritonserver }}-${{ matrix.model_type }}
          build-args: |
            HF_REPOS=${{ secrets.HF_REPOS }}
            HF_TOKENS=${{ secrets.HF_TOKENS }} 
            HF_MODEL_REF=${{ matrix.model_type }}
